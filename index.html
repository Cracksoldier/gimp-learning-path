<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GIMP Learning Path — Photoshop to GIMP</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ── Tokens ─────────────────────────────────────────────────── */
:root {
  --bg:            #0d1117;
  --surface:       #161b22;
  --surface-2:     #21262d;
  --border:        #30363d;
  --border-subtle: #21262d;
  --text:          #e6edf3;
  --text-muted:    #7d8590;
  --text-dim:      #484f58;

  --accent:        #58a6ff;
  --accent-dim:    #1f3a5f;

  --beginner:      #3fb950;
  --intermediate:  #d29922;
  --advanced:      #f78166;
  --expert:        #f85149;

  --bar-lessons:   #58a6ff;
  --bar-challenges:#bc8cff;

  --radius-sm:     6px;
  --radius:        10px;
  --radius-lg:     14px;

  --sidebar-w:     240px;
  --header-h:      auto;
}

/* ── Reset ──────────────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', sans-serif;
  background: var(--bg);
  color: var(--text);
  font-size: 14px;
  line-height: 1.6;
  min-height: 100vh;
}
button { cursor: pointer; font-family: inherit; }
input[type="file"] { display: none; }
a { color: var(--accent); text-decoration: none; }

/* ── Header ─────────────────────────────────────────────────── */
.app-header {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 20px 28px;
  position: sticky;
  top: 0;
  z-index: 100;
}
.header-top {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 16px;
  flex-wrap: wrap;
  margin-bottom: 16px;
}
.header-title h1 {
  font-size: 20px;
  font-weight: 700;
  color: var(--text);
  letter-spacing: -0.3px;
}
.header-title p {
  font-size: 13px;
  color: var(--text-muted);
  margin-top: 2px;
}
.header-actions {
  display: flex;
  gap: 8px;
  flex-shrink: 0;
  flex-wrap: wrap;
  align-items: center;
}

/* ── Buttons ─────────────────────────────────────────────────── */
.btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 7px 14px;
  border-radius: var(--radius-sm);
  font-size: 13px;
  font-weight: 500;
  border: 1px solid transparent;
  transition: background 0.15s, border-color 0.15s, opacity 0.15s;
  white-space: nowrap;
}
.btn:hover { opacity: 0.85; }
.btn-ghost {
  background: transparent;
  border-color: var(--border);
  color: var(--text-muted);
}
.btn-ghost:hover { border-color: var(--text-muted); color: var(--text); background: var(--surface-2); }
.btn-danger {
  background: transparent;
  border-color: var(--border);
  color: #f85149;
}
.btn-danger:hover { border-color: #f85149; background: rgba(248,81,73,0.08); }
.btn-icon { font-size: 15px; line-height: 1; }

/* ── Progress bars ───────────────────────────────────────────── */
.progress-section {
  display: flex;
  gap: 16px;
  flex-wrap: wrap;
}
.progress-item {
  flex: 1;
  min-width: 200px;
}
.progress-label {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 6px;
}
.progress-label-name {
  font-size: 12px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.6px;
  color: var(--text-muted);
}
.progress-label-count {
  font-size: 12px;
  font-weight: 600;
  color: var(--text);
}
.progress-track {
  height: 8px;
  background: var(--surface-2);
  border-radius: 999px;
  overflow: hidden;
  border: 1px solid var(--border-subtle);
}
.progress-fill {
  height: 100%;
  border-radius: 999px;
  width: 0%;
  transition: width 0.45s cubic-bezier(0.4,0,0.2,1);
}
.progress-fill.lessons  { background: var(--bar-lessons); }
.progress-fill.challenges { background: var(--bar-challenges); }

/* ── Layout shell ────────────────────────────────────────────── */
.app-body {
  display: flex;
  min-height: calc(100vh - 1px);
}

/* ── Sidebar ─────────────────────────────────────────────────── */
.sidebar {
  width: var(--sidebar-w);
  flex-shrink: 0;
  background: var(--surface);
  border-right: 1px solid var(--border);
  padding: 20px 0;
  position: sticky;
  top: 0;
  height: 100vh;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
  gap: 4px;
}
.sidebar-label {
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.7px;
  text-transform: uppercase;
  color: var(--text-dim);
  padding: 0 16px 8px;
}
.nav-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 9px 16px;
  cursor: pointer;
  border-radius: 0;
  transition: background 0.12s;
  border-left: 3px solid transparent;
  text-decoration: none;
  color: var(--text-muted);
}
.nav-item:hover { background: var(--surface-2); color: var(--text); }
.nav-item.active {
  color: var(--text);
  background: var(--surface-2);
}
.nav-item.active[data-level="beginner"]     { border-left-color: var(--beginner); }
.nav-item.active[data-level="intermediate"] { border-left-color: var(--intermediate); }
.nav-item.active[data-level="advanced"]     { border-left-color: var(--advanced); }
.nav-item.active[data-level="expert"]       { border-left-color: var(--expert); }

.nav-dot {
  width: 10px;
  height: 10px;
  border-radius: 50%;
  flex-shrink: 0;
}
[data-level="beginner"]     .nav-dot { background: var(--beginner); }
[data-level="intermediate"] .nav-dot { background: var(--intermediate); }
[data-level="advanced"]     .nav-dot { background: var(--advanced); }
[data-level="expert"]       .nav-dot { background: var(--expert); }

.nav-text { flex: 1; font-size: 13px; font-weight: 500; }
.nav-count { font-size: 11px; color: var(--text-dim); font-variant-numeric: tabular-nums; }

.sidebar-divider {
  height: 1px;
  background: var(--border);
  margin: 12px 16px;
}
.sidebar-stats {
  padding: 0 16px;
  display: flex;
  flex-direction: column;
  gap: 10px;
}
.sidebar-stat {
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.sidebar-stat-label { font-size: 12px; color: var(--text-muted); }
.sidebar-stat-value { font-size: 12px; font-weight: 600; color: var(--text); }

/* ── Main content ────────────────────────────────────────────── */
.main-content {
  flex: 1;
  padding: 32px 36px;
  max-width: 900px;
  overflow-x: hidden;
}

/* ── Section block ───────────────────────────────────────────── */
.section-block {
  margin-bottom: 56px;
}
.section-header {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 8px;
}
.section-badge {
  font-size: 11px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.7px;
  padding: 3px 9px;
  border-radius: 999px;
  color: #0d1117;
}
[data-level="beginner"]     .section-badge { background: var(--beginner); }
[data-level="intermediate"] .section-badge { background: var(--intermediate); }
[data-level="advanced"]     .section-badge { background: var(--advanced); }
[data-level="expert"]       .section-badge { background: var(--expert); }

.section-title {
  font-size: 22px;
  font-weight: 700;
  letter-spacing: -0.4px;
}
.section-desc {
  font-size: 13px;
  color: var(--text-muted);
  margin-bottom: 20px;
  line-height: 1.7;
}

/* ── Sub-section heading ─────────────────────────────────────── */
.subsection-heading {
  display: flex;
  align-items: center;
  gap: 10px;
  margin: 24px 0 12px;
}
.subsection-heading-text {
  font-size: 13px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.6px;
  color: var(--text-muted);
}
.subsection-count {
  font-size: 11px;
  color: var(--text-dim);
  font-weight: 500;
}
.subsection-line {
  flex: 1;
  height: 1px;
  background: var(--border);
}

/* ── Lesson card ─────────────────────────────────────────────── */
.lesson-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 14px 16px;
  margin-bottom: 8px;
  display: flex;
  gap: 12px;
  align-items: flex-start;
  transition: border-color 0.15s, background 0.2s, opacity 0.2s;
  cursor: pointer;
  user-select: none;
}
.lesson-card:hover { border-color: var(--text-dim); }
.lesson-card.completed {
  opacity: 0.6;
  background: var(--surface);
}
.lesson-card.completed .lesson-title { text-decoration: line-through; color: var(--text-muted); }

.lesson-checkbox {
  width: 20px;
  height: 20px;
  border-radius: 5px;
  border: 2px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  margin-top: 1px;
  transition: background 0.15s, border-color 0.15s;
  font-size: 12px;
  color: transparent;
}
.lesson-card.completed .lesson-checkbox {
  background: var(--beginner);
  border-color: var(--beginner);
  color: #0d1117;
}
[data-level="intermediate"] .lesson-card.completed .lesson-checkbox { background: var(--intermediate); border-color: var(--intermediate); }
[data-level="advanced"]     .lesson-card.completed .lesson-checkbox { background: var(--advanced); border-color: var(--advanced); }
[data-level="expert"]       .lesson-card.completed .lesson-checkbox { background: var(--expert); border-color: var(--expert); }

.lesson-body { flex: 1; min-width: 0; }
.lesson-title-row {
  display: flex;
  align-items: flex-start;
  gap: 8px;
  flex-wrap: wrap;
  margin-bottom: 5px;
}
.lesson-title {
  font-size: 14px;
  font-weight: 600;
  color: var(--text);
  transition: color 0.2s;
}
.ps-callout {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  background: rgba(210,153,34,0.15);
  border: 1px solid rgba(210,153,34,0.3);
  color: #d29922;
  font-size: 11px;
  font-weight: 500;
  padding: 2px 7px;
  border-radius: 999px;
  white-space: nowrap;
  flex-shrink: 0;
}
.ps-callout-prefix { font-weight: 700; font-size: 10px; opacity: 0.8; }

.lesson-desc {
  font-size: 13px;
  color: var(--text-muted);
  line-height: 1.65;
  margin-bottom: 8px;
}
.concept-chips {
  display: flex;
  flex-wrap: wrap;
  gap: 5px;
}
.concept-chip {
  font-size: 11px;
  padding: 2px 8px;
  border-radius: 999px;
  background: var(--surface-2);
  color: var(--text-dim);
  border: 1px solid var(--border);
  font-family: 'SF Mono', 'Fira Code', monospace;
}

/* ── Challenge card ──────────────────────────────────────────── */
.challenge-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 14px 16px 14px 20px;
  margin-bottom: 8px;
  display: flex;
  gap: 12px;
  align-items: flex-start;
  transition: border-color 0.15s, opacity 0.2s;
  cursor: pointer;
  user-select: none;
  position: relative;
}
.challenge-card::before {
  content: '';
  position: absolute;
  left: 0;
  top: 0;
  bottom: 0;
  width: 4px;
  border-radius: var(--radius) 0 0 var(--radius);
}
[data-level="beginner"]     .challenge-card::before { background: var(--beginner); }
[data-level="intermediate"] .challenge-card::before { background: var(--intermediate); }
[data-level="advanced"]     .challenge-card::before { background: var(--advanced); }
[data-level="expert"]       .challenge-card::before { background: var(--expert); }

.challenge-card:hover { border-color: var(--text-dim); }
.challenge-card.completed { opacity: 0.6; }
.challenge-card.completed .challenge-title { text-decoration: line-through; color: var(--text-muted); }

.challenge-checkbox {
  width: 20px;
  height: 20px;
  border-radius: 50%;
  border: 2px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  margin-top: 1px;
  font-size: 11px;
  color: transparent;
  transition: background 0.15s, border-color 0.15s;
}
.challenge-card.completed .challenge-checkbox {
  background: var(--bar-challenges);
  border-color: var(--bar-challenges);
  color: #0d1117;
}

.challenge-body { flex: 1; min-width: 0; }
.challenge-title-row {
  display: flex;
  align-items: center;
  gap: 8px;
  flex-wrap: wrap;
  margin-bottom: 5px;
}
.challenge-title { font-size: 14px; font-weight: 600; color: var(--text); }

.difficulty-badge {
  font-size: 10px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  padding: 2px 7px;
  border-radius: 999px;
}
.difficulty-badge.easy   { background: rgba(63,185,80,0.15); color: #3fb950; border: 1px solid rgba(63,185,80,0.3); }
.difficulty-badge.medium { background: rgba(210,153,34,0.15); color: #d29922; border: 1px solid rgba(210,153,34,0.3); }
.difficulty-badge.hard   { background: rgba(247,129,102,0.15); color: #f78166; border: 1px solid rgba(247,129,102,0.3); }
.difficulty-badge.expert { background: rgba(248,81,73,0.15); color: #f85149; border: 1px solid rgba(248,81,73,0.3); }

.challenge-desc {
  font-size: 13px;
  color: var(--text-muted);
  line-height: 1.65;
  margin-bottom: 8px;
}
.challenge-goal {
  font-size: 12px;
  color: var(--text-dim);
  font-style: italic;
  padding: 6px 10px;
  background: var(--surface-2);
  border-radius: var(--radius-sm);
  border-left: 2px solid var(--bar-challenges);
}
.challenge-goal strong { color: var(--text-muted); font-style: normal; }

/* ── Toast / notification ────────────────────────────────────── */
.toast {
  position: fixed;
  bottom: 24px;
  right: 24px;
  background: var(--surface-2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 12px 18px;
  font-size: 13px;
  color: var(--text);
  z-index: 9999;
  opacity: 0;
  transform: translateY(8px);
  transition: opacity 0.2s, transform 0.2s;
  pointer-events: none;
}
.toast.show { opacity: 1; transform: translateY(0); }
.toast.success { border-color: var(--beginner); }
.toast.error   { border-color: var(--expert); }

/* ── Modal ───────────────────────────────────────────────────── */
.modal-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.6);
  z-index: 500;
  align-items: center;
  justify-content: center;
}
.modal-overlay.open { display: flex; }
.modal {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 24px;
  max-width: 380px;
  width: 90%;
}
.modal h3 { font-size: 16px; font-weight: 700; margin-bottom: 10px; }
.modal p { font-size: 13px; color: var(--text-muted); margin-bottom: 20px; line-height: 1.65; }
.modal-actions { display: flex; gap: 8px; justify-content: flex-end; }
.btn-confirm { background: #f85149; border: none; color: #fff; padding: 8px 16px; border-radius: var(--radius-sm); font-size: 13px; font-weight: 600; }
.btn-confirm:hover { background: #da3630; }
.btn-cancel { background: transparent; border: 1px solid var(--border); color: var(--text-muted); padding: 8px 16px; border-radius: var(--radius-sm); font-size: 13px; font-weight: 500; }
.btn-cancel:hover { border-color: var(--text-muted); color: var(--text); }

/* ── Completion banner ───────────────────────────────────────── */
.completion-banner {
  background: linear-gradient(135deg, rgba(63,185,80,0.1), rgba(88,166,255,0.1));
  border: 1px solid rgba(63,185,80,0.3);
  border-radius: var(--radius);
  padding: 16px 20px;
  margin-bottom: 32px;
  display: none;
  align-items: center;
  gap: 12px;
}
.completion-banner.visible { display: flex; }
.completion-banner-icon { font-size: 28px; }
.completion-banner-text h3 { font-size: 15px; font-weight: 700; color: var(--beginner); margin-bottom: 3px; }
.completion-banner-text p { font-size: 13px; color: var(--text-muted); }

/* ── Responsive ──────────────────────────────────────────────── */
@media (max-width: 768px) {
  .app-body { flex-direction: column; }
  .sidebar {
    width: 100%;
    height: auto;
    position: static;
    flex-direction: row;
    overflow-x: auto;
    overflow-y: hidden;
    padding: 8px 12px;
    gap: 4px;
    border-right: none;
    border-bottom: 1px solid var(--border);
  }
  .sidebar-label, .sidebar-divider, .sidebar-stats { display: none; }
  .nav-item {
    flex-direction: column;
    gap: 4px;
    padding: 8px 12px;
    border-left: none;
    border-bottom: 3px solid transparent;
    border-radius: var(--radius-sm);
    white-space: nowrap;
    flex-shrink: 0;
  }
  .nav-item.active[data-level="beginner"]     { border-bottom-color: var(--beginner); border-left-color: transparent; }
  .nav-item.active[data-level="intermediate"] { border-bottom-color: var(--intermediate); border-left-color: transparent; }
  .nav-item.active[data-level="advanced"]     { border-bottom-color: var(--advanced); border-left-color: transparent; }
  .nav-item.active[data-level="expert"]       { border-bottom-color: var(--expert); border-left-color: transparent; }
  .nav-count { display: none; }
  .main-content { padding: 20px 16px; }
  .header-top { flex-direction: column; }
  .app-header { padding: 16px; }
}
@media (max-width: 480px) {
  .progress-section { flex-direction: column; }
  .header-actions { flex-wrap: wrap; }
}

/* ── Animations ──────────────────────────────────────────────── */
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(6px); }
  to   { opacity: 1; transform: translateY(0); }
}
.section-block { animation: fadeIn 0.35s ease both; }
.section-block:nth-child(1) { animation-delay: 0.05s; }
.section-block:nth-child(2) { animation-delay: 0.10s; }
.section-block:nth-child(3) { animation-delay: 0.15s; }
.section-block:nth-child(4) { animation-delay: 0.20s; }
</style>
</head>
<body>

<!-- Header -->
<header class="app-header">
  <div class="header-top">
    <div class="header-title">
      <h1>GIMP Learning Path</h1>
      <p>Structured guide for Photoshop users — Beginner to Expert</p>
    </div>
    <div class="header-actions">
      <input type="file" id="import-file" accept=".json">
      <button class="btn btn-ghost" onclick="handleImportButton()">
        <span class="btn-icon">⬆</span> Import
      </button>
      <button class="btn btn-ghost" onclick="handleExport()">
        <span class="btn-icon">⬇</span> Export
      </button>
      <button class="btn btn-danger" onclick="handleResetClick()">
        <span class="btn-icon">↺</span> Reset
      </button>
    </div>
  </div>
  <div class="progress-section">
    <div class="progress-item">
      <div class="progress-label">
        <span class="progress-label-name">Lessons</span>
        <span class="progress-label-count" id="lesson-count">0 / 32 (0%)</span>
      </div>
      <div class="progress-track">
        <div class="progress-fill lessons" id="lesson-bar"></div>
      </div>
    </div>
    <div class="progress-item">
      <div class="progress-label">
        <span class="progress-label-name">Challenges</span>
        <span class="progress-label-count" id="challenge-count">0 / 15 (0%)</span>
      </div>
      <div class="progress-track">
        <div class="progress-fill challenges" id="challenge-bar"></div>
      </div>
    </div>
  </div>
</header>

<!-- Body -->
<div class="app-body">
  <nav class="sidebar" id="sidebar"></nav>
  <main class="main-content" id="main-content"></main>
</div>

<!-- Reset confirmation modal -->
<div class="modal-overlay" id="reset-modal">
  <div class="modal">
    <h3>Reset all progress?</h3>
    <p>This will clear all checked lessons and challenges. Your progress cannot be recovered unless you exported it first.</p>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn-confirm" onclick="confirmReset()">Reset everything</button>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
/* ── Learning path data ──────────────────────────────────────── */
const LEARNING_PATH = [
  {
    id: 'beginner',
    title: 'Beginner',
    level: 'beginner',
    description: 'Essential GIMP concepts for Photoshop users. Learn the new interface, tool names, and fundamental workflows that map directly from what you already know.',
    lessons: [
      {
        id: 'beginner-1',
        title: 'Interface Overview & Workspace',
        psEquivalent: 'PS Workspace / Panels',
        description: 'GIMP uses a multi-window layout by default, but Single-Window Mode (Windows › Single-Window Mode) closely mirrors Photoshop\'s workspace. The Toolbox lives on the left, Tool Options below it, and Dockable Dialogs (Layers, Colors, etc.) on the right.',
        concepts: ['Single-Window Mode', 'Toolbox', 'Tool Options', 'Dockable Dialogs', 'Windows › Dockable Dialogs']
      },
      {
        id: 'beginner-2',
        title: 'Essential Tool Equivalents',
        psEquivalent: 'PS Toolbox',
        description: 'Master the GIMP toolbox by mapping each Photoshop tool to its GIMP counterpart. Keyboard shortcuts differ — Move is still M, but Transform/Scale is Shift+T, and the Quick Mask is Q instead of a panel button.',
        concepts: ['Move Tool (M)', 'Scale Tool (Shift+T)', 'Align Tool', 'Crop Tool (Shift+C)', 'Flip Tool']

/* ── State ───────────────────────────────────────────────────── */
const STORAGE_KEY = 'gimp-lp-v1';
let state = { version: 1, lessons: {}, challenges: {} };

function defaultState() {
  const s = { version: 1, lessons: {}, challenges: {} };
  LEARNING_PATH.forEach(section => {
    section.lessons.forEach(l => { s.lessons[l.id] = false; });
    section.challenges.forEach(c => { s.challenges[c.id] = false; });
  });
  return s;
}

function loadState() {
  const def = defaultState();
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) {
      const parsed = JSON.parse(raw);
      state.lessons    = Object.assign({}, def.lessons,    parsed.lessons    || {});
      state.challenges = Object.assign({}, def.challenges, parsed.challenges || {});
    } else {
      state = def;
    }
  } catch (e) {
    state = def;
  }
}

function saveState() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
}

/* ── Stats ───────────────────────────────────────────────────── */
function getLessonStats() {
  const total = Object.keys(state.lessons).length;
  const done  = Object.values(state.lessons).filter(Boolean).length;
  return { done, total, pct: total ? Math.round(done / total * 100) : 0 };
}

function getChallengeStats() {
  const total = Object.keys(state.challenges).length;
  const done  = Object.values(state.challenges).filter(Boolean).length;
  return { done, total, pct: total ? Math.round(done / total * 100) : 0 };
}

function getSectionLessonStats(sectionId) {
  const section = LEARNING_PATH.find(s => s.id === sectionId);
  if (!section) return { done: 0, total: 0 };
  const total = section.lessons.length;
  const done  = section.lessons.filter(l => state.lessons[l.id]).length;
  return { done, total };
}

function getSectionChallengeStats(sectionId) {
  const section = LEARNING_PATH.find(s => s.id === sectionId);
  if (!section) return { done: 0, total: 0 };
  const total = section.challenges.length;
  const done  = section.challenges.filter(c => state.challenges[c.id]).length;
  return { done, total };
}

/* ── Rendering ───────────────────────────────────────────────── */
function renderProgressBars() {
  const ls = getLessonStats();
  const cs = getChallengeStats();

  document.getElementById('lesson-bar').style.width   = ls.pct + '%';
  document.getElementById('challenge-bar').style.width = cs.pct + '%';
  document.getElementById('lesson-count').textContent   = `${ls.done} / ${ls.total} (${ls.pct}%)`;
  document.getElementById('challenge-count').textContent = `${cs.done} / ${cs.total} (${cs.pct}%)`;

  const allDone = ls.done === ls.total && cs.done === cs.total && ls.total > 0;
  const banner = document.getElementById('completion-banner');
  if (banner) banner.classList.toggle('visible', allDone);
}

function renderSidebar() {
  const sidebar = document.getElementById('sidebar');
  let html = '<div class="sidebar-label">Sections</div>';

  LEARNING_PATH.forEach((section, i) => {
    const ls = getSectionLessonStats(section.id);
    const cs = getSectionChallengeStats(section.id);
    html += `
      <a class="nav-item${i === 0 ? ' active' : ''}" data-level="${section.level}"
         href="#section-${section.id}" data-section="${section.id}"
         onclick="handleNavClick(event, '${section.id}')">
        <div class="nav-dot"></div>
        <span class="nav-text">${section.title}</span>
        <span class="nav-count" id="nav-count-${section.id}">${ls.done + cs.done}/${ls.total + cs.total}</span>
      </a>`;
  });

  html += '<div class="sidebar-divider"></div>';
  html += '<div class="sidebar-stats">';
  const ls = getLessonStats();
  const cs = getChallengeStats();
  html += `
    <div class="sidebar-stat">
      <span class="sidebar-stat-label">Lessons</span>
      <span class="sidebar-stat-value" id="sidebar-lesson-count">${ls.done} / ${ls.total}</span>
    </div>
    <div class="sidebar-stat">
      <span class="sidebar-stat-label">Challenges</span>
      <span class="sidebar-stat-value" id="sidebar-challenge-count">${cs.done} / ${cs.total}</span>
    </div>`;
  html += '</div>';
  sidebar.innerHTML = html;
}

function difficultyClass(d) {
  const map = { 'Easy': 'easy', 'Medium': 'medium', 'Hard': 'hard', 'Expert': 'expert' };
  return map[d] || 'medium';
}

function escapeHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function renderLessonCard(lesson, sectionId) {
  const done = !!state.lessons[lesson.id];
  const checkmark = done ? '✓' : '';
  const doneClass = done ? ' completed' : '';
  const psTag = lesson.psEquivalent
    ? `<span class="ps-callout"><span class="ps-callout-prefix">↔</span>${escapeHtml(lesson.psEquivalent)}</span>`
    : '';
  const chips = lesson.concepts.map(c => `<span class="concept-chip">${escapeHtml(c)}</span>`).join('');

  return `
    <div class="lesson-card${doneClass}" id="card-${lesson.id}"
         onclick="handleLessonToggle('${lesson.id}', '${sectionId}')">
      <div class="lesson-checkbox" id="check-${lesson.id}">${checkmark}</div>
      <div class="lesson-body">
        <div class="lesson-title-row">
          <span class="lesson-title" id="title-${lesson.id}">${escapeHtml(lesson.title)}</span>
          ${psTag}
        </div>
        <div class="lesson-desc">${escapeHtml(lesson.description)}</div>
        <div class="concept-chips">${chips}</div>
      </div>
    </div>`;
}

function renderChallengeCard(challenge, sectionId) {
  const done = !!state.challenges[challenge.id];
  const checkmark = done ? '✓' : '';
  const doneClass = done ? ' completed' : '';
  const dc = difficultyClass(challenge.difficulty);

  return `
    <div class="challenge-card${doneClass}" id="card-${challenge.id}"
         onclick="handleChallengeToggle('${challenge.id}', '${sectionId}')">
      <div class="challenge-checkbox" id="check-${challenge.id}">${checkmark}</div>
      <div class="challenge-body">
        <div class="challenge-title-row">
          <span class="challenge-title" id="title-${challenge.id}">${escapeHtml(challenge.title)}</span>
          <span class="difficulty-badge ${dc}">${escapeHtml(challenge.difficulty)}</span>
        </div>
        <div class="challenge-desc">${escapeHtml(challenge.description)}</div>
        <div class="challenge-goal"><strong>Goal:</strong> ${escapeHtml(challenge.goal)}</div>
      </div>
    </div>`;
}

function renderSection(section) {
  const ls = getSectionLessonStats(section.id);
  const cs = getSectionChallengeStats(section.id);

  let lessonsHtml = '';
  section.lessons.forEach(l => { lessonsHtml += renderLessonCard(l, section.id); });

  let challengesHtml = '';
  section.challenges.forEach(c => { challengesHtml += renderChallengeCard(c, section.id); });

  return `
    <div class="section-block" id="section-${section.id}" data-level="${section.level}">
      <div class="section-header">
        <span class="section-badge">${escapeHtml(section.level)}</span>
        <h2 class="section-title">${escapeHtml(section.title)}</h2>
      </div>
      <p class="section-desc">${escapeHtml(section.description)}</p>

      <div class="subsection-heading">
        <span class="subsection-heading-text">Lessons</span>
        <span class="subsection-count" id="lcount-${section.id}">${ls.done} / ${ls.total} completed</span>
        <div class="subsection-line"></div>
      </div>
      ${lessonsHtml}

      <div class="subsection-heading">
        <span class="subsection-heading-text">Challenges</span>
        <span class="subsection-count" id="ccount-${section.id}">${cs.done} / ${cs.total} completed</span>
        <div class="subsection-line"></div>
      </div>
      ${challengesHtml}
    </div>`;
}

function render() {
  const main = document.getElementById('main-content');
  let html = `
    <div class="completion-banner" id="completion-banner">
      <div class="completion-banner-icon">🎓</div>
      <div class="completion-banner-text">
        <h3>Learning Path Complete!</h3>
        <p>You've completed all lessons and challenges. You're now an expert GIMP user.</p>
      </div>
    </div>`;
  LEARNING_PATH.forEach(section => { html += renderSection(section); });
  main.innerHTML = html;
}

/* ── In-place DOM updates (fast path, no re-render) ──────────── */
function updateCardDOM(id, type) {
  const done = type === 'lesson' ? !!state.lessons[id] : !!state.challenges[id];
  const card  = document.getElementById('card-' + id);
  const check = document.getElementById('check-' + id);
  const title = document.getElementById('title-' + id);
  if (!card) return;
  card.classList.toggle('completed', done);
  if (check) { check.textContent = done ? '✓' : ''; }
}

function updateSectionCounts(sectionId) {
  const ls = getSectionLessonStats(sectionId);
  const cs = getSectionChallengeStats(sectionId);
  const lc = document.getElementById('lcount-' + sectionId);
  const cc = document.getElementById('ccount-' + sectionId);
  if (lc) lc.textContent = `${ls.done} / ${ls.total} completed`;
  if (cc) cc.textContent = `${cs.done} / ${cs.total} completed`;

  const nc = document.getElementById('nav-count-' + sectionId);
  if (nc) nc.textContent = `${ls.done + cs.done}/${ls.total + cs.total}`;

  const sl = document.getElementById('sidebar-lesson-count');
  const sc = document.getElementById('sidebar-challenge-count');
  const gls = getLessonStats();
  const gcs = getChallengeStats();
  if (sl) sl.textContent = `${gls.done} / ${gls.total}`;
  if (sc) sc.textContent = `${gcs.done} / ${gcs.total}`;
}

/* ── Event handlers ──────────────────────────────────────────── */
function handleLessonToggle(id, sectionId) {
  state.lessons[id] = !state.lessons[id];
  saveState();
  updateCardDOM(id, 'lesson');
  updateSectionCounts(sectionId);
  renderProgressBars();
}

function handleChallengeToggle(id, sectionId) {
  state.challenges[id] = !state.challenges[id];
  saveState();
  updateCardDOM(id, 'challenge');
  updateSectionCounts(sectionId);
  renderProgressBars();
}

function handleNavClick(e, sectionId) {
  e.preventDefault();
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  e.currentTarget.classList.add('active');
  const target = document.getElementById('section-' + sectionId);
  if (target) target.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

/* ── Import / Export / Reset ─────────────────────────────────── */
function handleExport() {
  const date = new Date().toISOString().slice(0, 10);
  const blob = new Blob([JSON.stringify(state, null, 2)], { type: 'application/json' });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href     = url;
  a.download = `gimp-progress-${date}.json`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  showToast('Progress exported successfully.', 'success');
}

function handleImportButton() {
  document.getElementById('import-file').click();
}

function handleImport(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const data = JSON.parse(e.target.result);
      if (!data || typeof data !== 'object' || !data.lessons || !data.challenges) {
        showToast('Invalid progress file.', 'error');
        return;
      }
      const def = defaultState();
      state.lessons    = Object.assign({}, def.lessons,    data.lessons);
      state.challenges = Object.assign({}, def.challenges, data.challenges);
      saveState();
      render();
      renderProgressBars();
      showToast('Progress imported successfully.', 'success');
    } catch (err) {
      showToast('Failed to parse JSON file.', 'error');
    }
    event.target.value = '';
  };
  reader.readAsText(file);
}

function handleResetClick() {
  document.getElementById('reset-modal').classList.add('open');
}

function closeModal() {
  document.getElementById('reset-modal').classList.remove('open');
}

function confirmReset() {
  state = defaultState();
  saveState();
  closeModal();
  render();
  renderProgressBars();
  showToast('Progress reset.', 'success');
}

/* ── Toast ───────────────────────────────────────────────────── */
let toastTimer = null;
function showToast(msg, type = 'success') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className   = `toast ${type} show`;
  if (toastTimer) clearTimeout(toastTimer);
  toastTimer = setTimeout(() => { t.classList.remove('show'); }, 2800);
}

/* ── Intersection observer for sidebar active state ─────────── */
function setupScrollSpy() {
  const sectionIds = LEARNING_PATH.map(s => s.id);
  const observer = new IntersectionObserver(entries => {
    entries.forEach(entry => {
      if (entry.isIntersecting) {
        const id = entry.target.id.replace('section-', '');
        document.querySelectorAll('.nav-item').forEach(n => {
          n.classList.toggle('active', n.dataset.section === id);
        });
      }
    });
  }, { threshold: 0.25 });

  sectionIds.forEach(id => {
    const el = document.getElementById('section-' + id);
    if (el) observer.observe(el);
  });
}

/* ── Init ────────────────────────────────────────────────────── */
function init() {
  loadState();
  renderSidebar();
  render();
  renderProgressBars();
  setupScrollSpy();

  document.getElementById('import-file').addEventListener('change', handleImport);
  document.getElementById('reset-modal').addEventListener('click', function(e) {
    if (e.target === this) closeModal();
  });
  document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') closeModal();
  });
}

document.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
